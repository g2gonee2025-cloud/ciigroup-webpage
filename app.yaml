name: ciigroup-webpage
region: sgp
domains:
  - domain: ciigroup.me
    type: PRIMARY
  - domain: www.ciigroup.me
    type: ALIAS
static_sites:
  - name: website
    source_dir: .
    build_command: >-
      mkdir -p dist/en/authenticate &&
      cp index.html 404.html styles.css script.js dist/ &&
      cp en/authenticate/index.html dist/en/authenticate/index.html
    output_dir: dist
    index_document: index.html
    catchall_document: 404.html
    git:
      branch: main
      repo_clone_url: https://github.com/g2gonee2025-cloud/ciigroup-webpage.git
