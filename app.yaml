name: ciigroup-webpage
region: sgp
domains:
  - domain: ciigroup.me
    type: PRIMARY
  - domain: www.ciigroup.me
    type: ALIAS
static_sites:
  - name: website
    source_dir: .
    build_command: >-
      rm -rf dist &&
      mkdir -p dist &&
      cp -R www.ciigroup.me/. dist/ &&
      rm -rf dist/assets &&
      cp -R www.ciigroup.me/Assets dist/assets &&
      cp www.ciigroup.me/index.html dist/404.html
    output_dir: dist
    index_document: index.html
    catchall_document: 404.html
    git:
      branch: main
      repo_clone_url: https://github.com/g2gonee2025-cloud/ciigroup-webpage.git
